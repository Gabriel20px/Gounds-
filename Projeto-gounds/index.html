<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gounds</title>
    <link rel="stylesheet" href="/Projeto-gounds/src/assets/css/style_index.css">
    <link rel="icon" href="/projeto-gounds/src/assets/img/Copilot_20260325_210525.png" type="image/png">
    
</head>
<body>
    <!-- header -->
    <header class="header-container">
         

        <div class="title_img">
            <img src="/Projeto-gounds/src/assets/img/gounds.png" alt="Gounds" class="gounds_img">
            <h1 class="title"><strong>Gounds!</strong></h1>
        </div>

        <div class="bandeiras">
            <img src="/Projeto-gounds/src/assets/img/brasil.png" alt="brasil" class="brasil">
            <img src="/Projeto-gounds/src/assets/img/estados-unidos.png" alt="estados_unidos" class="estados_unidos">
        </div>

        <div class="icones_de_estatisticas">
            <img src="/Projeto-gounds/src/assets/img/brasil_redondo.png" alt="Brasil">
                <span class="numeros_estatisticas">60</span>
            <img src="/Projeto-gounds/src/assets/img/fogueira.png" alt="Fogueira">
                <span class="numeros_estatisticas">20</span>
            <img src="/Projeto-gounds/src/assets/img/diamante.png" alt="Diamante">
                <span class="numeros_estatisticas">40</span>
            <img src="/Projeto-gounds/src/assets/img/amor.png" alt="Amor">
                <span class="numeros_estatisticas">30</span>
        </div>
    </header>

    <!-- barra lateral esquerda -->
    <div class="barra_esquerda_container">
        <div class="plus_container">
            <div class="plus_content">
                <p class="plus_title"><strong>Plus</strong></p>
                <p>Teste o Plus de graça</p>
                <p>Zero anúncios, praticas personalizadas e nivel titãs ilimitado!</p>
                <p><strong>Experimente</strong></p>
            </div>
        </div>
        <div class="missoes_container">
            <div class="missoes_content">
                <h2>Missões do dia</h2>
                <div class="missao_1">
                    <input type="checkbox" id="opcao1" name="opcao1" value="valor1">
                    <label for="opcao1">Complete uma missão</label>
                </div>
                <div class="missao_2">
                    <input type="checkbox" id="opcao2" name="opcao2" value="valor2">
                    <label for="opcao2">Pratique por 10 minutos</label>
                </div>
                <div class="missao_3">
                    <input type="checkbox" id="opcao3" name="opcao3" value="valor3">
                    <label for="opcao3">Pratique por 30 minutos</label>
                </div>
                <div class="missao_4">
                    <input type="checkbox" id="opcao4" name="opcao4" value="valor4">
                    <label for="opcao4">Pratique 1 hora</label>
                </div>
                
                <button id="ver_todas">Ver todas</button> <!-- Nessa parte é para fazer uma função de expandir e voltar -->
            </div>
        </div>
    </div>

    <!-- aside -->
    <div class="aside_container">
        <aside>
            <nav class="navegacao">
                <ul>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-página-inicial-96.png" alt="" class="icones">
                        <a href="#" class="words">Home</a>
                    </li>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-idioma-100.png" alt="" class="icones">
                        <a href="#" class="words">Línguas</a>
                    </li>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-barra-de-peso-100.png" alt="" class="icones">
                        <a href="#" class="words">Praticar</a>
                    </li>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-escudo-100.png" alt="" class="icones">
                        <a href="#" class="words">Ligas</a>
                    </li>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-profile-50.png" alt="" class="icones">
                        <a href="#" class="words">Perfil</a>
                    </li>
                    <li>
                        <img src="/Projeto-gounds/src/assets/img/icons8-reticências-100.png" alt="" class="icones">
                        <a href="#" class="words">Mais</a>
                    </li>
                </ul>
            </nav>
        </aside>
    </div>

    <!-- main -->
    <div class="container_main">
        <main>
            <div class="informação_container">
                <p><strong>Aula 4, seção 2</strong></p>
                <h1>Peça informações</h1>
            </div>
            <div class="circles_container">

                <div class="circle_star_1">
                </div>
                <div class="circle_star_2">
                </div>
                <div class="circle_star_3">
                </div>
                <div class="circle_star_4">
                </div>

            </div>
        </main>
    </div>

</body>
</html>
